<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model</title>
    <style>
        body{
            background-color: antiquewhite
        }

        /* Exemplo de block-level */
        h1{
           
            background-color: #ffff;
            padding:40px 10px;
            margin:40px 20px;
            border-width: 10px;
            border-style: solid;
            border-color: rgb(112, 141, 212);
        }

        /* Exemplo de block-inline */
        a{
            display: block;
            background-color: #ffff;
            padding:10px 20px;
            margin:20px 20px;
            border-width: 10px;
            border-style:solid;
            border-color: rgb(217, 144, 18); 
        }
    </style>

</head>
<body>
    <h1>Aprendendo Modelo de Caixas</h1>
    <p>Aprendendo sobre Block-level e <a href="#">também sobre Inline-level.</a></p>
</body>
</html>
