<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias</title>
</head>
<body>
    <h1>Aprendendo a colocar mídias em HTML</h1>
    <picture>
        <source media="(max-width: 750px )" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="imagem flexível">
    </picture>
    <h2>Aprendendo a colocar mídia de audio.</h2>
    <!--<audio src="audio/golden-palms.mp3" controls>
    </audio>-->
    
    <audio preload="metadata" autoplay controls>
        <source src="audio/golden-palms.mp3" type="audio/mpeg">
    </audio>


</body>
</html>
