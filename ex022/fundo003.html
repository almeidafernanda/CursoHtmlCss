<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posicionamento de fundo</title>
    <style>
        div.blocos {
            background-image: url(imagens/wallpaper003.jpg);
            height: 150px;
            border: 5px solid black;
            margin:5px;
            border-radius:8px;
        }

        #q1 {
            background-position: top left;
        }

        #q2 {
             background-position:top right;
        }
        
        #q3 {
             background-position: center;
        }
     
        #q4 {
             background-position:bottom right;
        }
    </style>
</head>
<body>
    <div class="blocos" id="q1"></div>
    <div class="blocos" id="q2"></div>
    <div class="blocos" id="q3"></div>
    <div class="blocos" id="q4"></div>

</body>
</html>
