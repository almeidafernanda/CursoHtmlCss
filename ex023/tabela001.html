<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        table {
            width:400px;
            height: 400px;
            border-collapse: collapse;
        }

        .numero {
            text-align: right;
        }


        td {
            border:1px solid black;
            padding: 10px;
            text-align:center;
            vertical-align: bottom;
        }
    </style>
</head>
<body>
    <h1>Minha primeira tabela.</h1>
    <!-- Hierarquia de tabela simples.
     TABLE = tabela
     TABLE ROW = linha de tabela
     TABLE HEADER = cabeçalho de tabela 
     TABLE DATA = dado de tabela
      -->
    <table>
        <!-- Primeira linha  (tr = table row) -->
        <tr> 
            <!-- td = table data -->
            <td>A1</td>
            <td>B1</td>
            <td>C1</td>
        </tr>
        <tr>
            <td>A2</td>
            <td class="numero">100</td>
            <td>C2</td>
        </tr>
        <tr>
            <td>A3</td>
            <td>B3</td>
            <td>C3</td>
        </tr>
        <tr>
            <td>A4</td>
            <td>B4</td>
            <td class="numero">224</td>
        </tr>
        
    </table>
</body>
</html>
