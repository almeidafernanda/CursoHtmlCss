<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela Completa</title>
    <style>
        table {
            font-family: Arial, Helvetica, sans-serif;
            width: 500px;
            border-collapse: collapse;
            text-align: center;
        }
        th {
            border: 1px solid black;
            padding: 10px;
            font-size: 1.05em;
        }
        td {
            border: 1px solid black;
            padding: 10px;
        }
        .estilo {
            background-color: gray;
            color: white;
        }

        .left {
            text-align: left;
        }
        caption {
            font-size: 1.5em;
            border: 1px solid black;
            background-color: rgb(69, 68, 68);
            color: white;
            padding: 10px;
            font-weight: bold;
        }
        .col1 {
            background-color: rgb(195, 200, 243);
        }
    
        .col2 {
            background-color: rgb(102, 121, 198);
        }
        .col3{
            background-color: rgb(174, 129, 238);
        }
        .col4 {
            background-color: rgb(58, 192, 249);
        }

    </style>
</head>
<body>
    <table>
        <colgroup>
        <col class="col1">
        <col class="col2">
        <col class="col3" span="2">
        <col class="col4">

        </colgroup>
        <caption>Boletim Escolar</caption>
    <thead class="estilo">
            <th scope="col" rowspan="2">Área</th>
            <th scope="col" rowspan="2">Disciplina</th>
            <th colspan="2" scope="colgroup">Notas</th>
            <th scope="col" rowspan="2">Média</th>
            <tr>
                <th>Notas 1</th>
                <th>Notas 2</th>
            </tr>
    </thead>
    <tbody>
        <tr>
            <th rowspan="4" scope="rowgroup">Exatas</th>
            <td class="left">Matemática</td>
            <td>00</td>
            <td>00</td>
            <td>00</td>
        </tr>
        <tr>
            <td class="left">Física</td>
            <td>00</td>
            <td>00</td>
            <td>00</td>
        </tr>
        <tr>
            <td class="left">Química</td>
            <td>00</td>
            <td>00</td>
            <td>00</td>
        </tr>
        <tr>
            <td class="left">Biologia</td>
            <td>00</td>
            <td>00</td>
            <td>00</td>
        </tr>
        <tr class="estilo">
            <th colspan="4" class="left" scope="row">Média de Exatas</th>
            <td>00</td>
        </tr>
        <tr>
            <th rowspan="2" scope="rowgroup">Humanas</th>
            <td class="left">História</td>
            <td>00</td>
            <td>00</td>
            <td>00</td>
        </tr>
        <tr>
            <td class="left">Geografia</td>
            <td>00</td>
            <td>00</td>
            <td>00</td>
        </tr>
        <tr class="estilo">
            <th colspan="4" class="left" scope="row">Média de Humanas</th>
            <td>00</td>
    </tbody>
    </table>
</body>
</html>
