<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-Classes</title>
    <style>
        div{
            display: inline-block;
            background-color: rgb(43, 237, 227);
            border: 1px solid black;
            text-align: center;
            height: 200px;
            width: 200px;
        }
        /* Hover é o estado como o elemento esta. */
        div:hover{ 
            background-color: yellow;
        }
    </style>
</head>
<body>
    <div>01</div>
    <div>02</div>
    <div>03</div>
    <div>04</div>
</body>
</html>
