<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover</title>
    <style>
        div > p {
            display: none;
        }

        div:hover > p{
            display: block;
            color: yellow;
            font-size: 2em;
            font-style: italic;
        }


       
    </style>
</head>
<body>
    <h1>Veja embaixo a mensagem secreta.</h1>

    <div>
        <h2>Passa o mouse aqui!</h2>
        <p>Você merece todo o sucesso do mundo!</p>
    </div>
    <p>Fim do exemplo.</p>
</body>
</html>
